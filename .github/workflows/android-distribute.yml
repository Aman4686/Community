name: Android — Firebase App Distribution

on:
  workflow_dispatch:

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@14

      # Temporary diagnostic: confirms the secret is reaching the workflow
      # without printing it. Remove once auth is working.
      - name: Check secret present
        run: |
          if [ -z "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT_JSON is EMPTY — name mismatch or not set on the Secrets tab"
            exit 1
          fi
          echo "secret present"

      # Auth via a Google service account, replacing the deprecated
      # --token / FIREBASE_TOKEN flow. Store the raw service-account JSON
      # (exactly as downloaded, no encoding) in the FIREBASE_SERVICE_ACCOUNT_JSON secret.
      # This action writes the key to a temp file and exports
      # GOOGLE_APPLICATION_CREDENTIALS for the steps that follow.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          # Resolve the APK by glob so a different archive base name won't break the run.
          APK=$(ls androidApp/build/outputs/apk/debug/*.apk | head -n1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found under androidApp/build/outputs/apk/debug/"
            exit 1
          fi
          echo "Distributing $APK"

          firebase appdistribution:distribute "$APK" \
            --app "$FIREBASE_APP_ID" \
            --groups testers \
            --release-notes "Build #${{ github.run_number }}"